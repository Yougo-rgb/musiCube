<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./styles/main.css">
    <link rel="icon" href="./assets/favicon.png">
    <title>musiCube - Play music with your GAN Smart Cube</title>
    <meta name="description" content="musiCube turns your GAN Smart Cube into a musical instrument.">
    <meta name="keywords" content="GAN cube, smart cube, music cube, web bluetooth, tone.js, rubik cube music">
    <meta name="author" content="Hugo Pozzi">
    <meta property="og:title" content="musiCube - Play music with your GAN Smart Cube">
    <meta property="og:description" content="Turn your GAN Smart Cube into a musical instrument using Web Bluetooth and Tone.js.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://yougo-rgb.github.io/musiCube/">
    <link rel="sitemap" type="application/xml" title="Sitemap" href="/musiCube/sitemap.xml">
</head>
<body>
    <a id="title" href="https://github.com/Yougo-rgb/musiCube" target="_blank">
        <div>
            <h1>musiCube</h1>
            <p>By Hugo Pozzi</p>
        </div>
    </a>

    <div class="select-row">

        <div>
            <button id="connect">Connect</button>
    
            <button id="clear">Clear</button>
        </div>

        <div>
            <select id="key"></select>
            
            <select id="scale"></select>
        </div>
    </div>

    <div id="info">
        <div id="status">Connect your cube !</div>
        <div class="copyable" data-tooltip="Click to copy" id="moves">Moves</div>
        <div class="copyable" data-tooltip="Click to copy" id="notes">Notes</div>

        <div id="cube"></div>
    </div>

    <div id="footer"><a href="https://github.com/Yougo-rgb/musiCube" target="_blank">musiCube © 2026</a> <a href="https://github.com/Yougo-rgb" target="_blank">Hugo Pozzi</a></div>

    <script type="module" src="./src/app.js"></script>
